apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: configbuddy-cmdb
  labels:
    app: api-server
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-server
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api-server
          image: configbuddy/api-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: NEO4J_URI
              value: "neo4j://neo4j-0.neo4j-cluster.configbuddy-cmdb.svc.cluster.local:7687,neo4j://neo4j-1.neo4j-cluster.configbuddy-cmdb.svc.cluster.local:7687,neo4j://neo4j-2.neo4j-cluster.configbuddy-cmdb.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: neo4j-password
            - name: POSTGRES_HOST
              value: "postgres-primary.configbuddy-cmdb.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "cmdb"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: postgres-password
            - name: REDIS_CLUSTER_NODES
              value: "redis-0.redis-cluster.configbuddy-cmdb.svc.cluster.local:6379,redis-1.redis-cluster.configbuddy-cmdb.svc.cluster.local:6379,redis-2.redis-cluster.configbuddy-cmdb.svc.cluster.local:6379,redis-3.redis-cluster.configbuddy-cmdb.svc.cluster.local:6379,redis-4.redis-cluster.configbuddy-cmdb.svc.cluster.local:6379,redis-5.redis-cluster.configbuddy-cmdb.svc.cluster.local:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: redis-password
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka.configbuddy-cmdb.svc.cluster.local:9092,kafka-1.kafka.configbuddy-cmdb.svc.cluster.local:9092,kafka-2.kafka.configbuddy-cmdb.svc.cluster.local:9092"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: configbuddy-cmdb
  labels:
    app: api-server
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: api-server
